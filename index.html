function relativeTime(iso) {
  if (!iso) return "";
  const t = new Date(iso).getTime();
  const diff = (Date.now() - t) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  const days = Math.floor(diff / 86400);
  if (days === 1) return "yesterday";
  if (days < 7) return days + "d ago";
  return new Date(iso).toLocaleDateString();
}

  Q2: ["Apr", "May", "Jun"],
  Q3: ["Jul", "Aug", "Sep"],
  Q4: ["Oct", "Nov", "Dec"],
};
const TEAM_ROSTER = [
  { initials: "JS",  name: "João Silva" },
  { initials: "AC",  name: "Alexandre Chícharo" },
  { initials: "MP",  name: "Mário Pinto" },
  { initials: "TS",  name: "Teresa Santos" },
  { initials: "GA",  name: "Gonçalo Amorim" },
  { initials: "DG",  name: "Daniel Gomes" },
  { initials: "PP",  name: "Pedro Pedrosa" },
  { initials: "JM",  name: "João Machado" },
  { initials: "AL",  name: "Afonso Leitão" },
  { initials: "MM",  name: "Mário Moutinho" },
  { initials: "RP",  name: "Rúben Pereira" },
  { initials: "DC",  name: "Diogo Cardoso" },
];
const ROSTER_BY_INITIALS = Object.fromEntries(TEAM_ROSTER.map(p => [p.initials, p.name]));
const OWNER_REMAP = { JPS: "JS" };
function normalizeOwner(o) { return OWNER_REMAP[o] || o; }

function migrateData(arr) {
  if (!Array.isArray(arr)) return arr;
  return arr.map(d => ({
    ...d,
    owner: normalizeOwner(d.owner),
    lt: d.lt ? normalizeOwner(d.lt) : d.lt,
    participants: Array.isArray(d.participants) ? d.participants.map(normalizeOwner) : [],
    validated: !!d.validated,
    validatedAt: d.validatedAt || null,
  }));
}

function yearsInRange(from, to) {
  const fi = ALL_YEARS.indexOf(from);
  const ti = ALL_YEARS.indexOf(to);
  if (fi < 0 || ti < 0 || fi > ti) return ALL_YEARS;
  return ALL_YEARS.slice(fi, ti + 1);
}

// --- SUPABASE LOAD FUNCTION ---
async function loadFromSupabase(setData, setLoading) {
  try {
    const { data, error } = await supabaseClient.from('outputs').select('*');
    if (error) throw error;

    if (data && data.length > 0) {
      setData(migrateData(data));
    } else {
      setData(migrateData(SEED_DATA));
      // Uncomment the line below if you want to auto-seed the DB on first load:
      // await supabaseClient.from('outputs').insert(migrateData(SEED_DATA));
    }
  } catch (error) {
    console.error("Error loading data from Supabase:", error);
    setData(migrateData(SEED_DATA));
  } finally {
    setLoading(false);
  }
}

function MultiSelect({ label, options, selected, onChange, allLabel = "Any" }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    if (!open) return;
    const close = (e) => {
      if (!e.target.closest(".multi-select")) setOpen(false);
    };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);

  const toggle = (val) => {
    if (selected.includes(val)) onChange(selected.filter(s => s !== val));
    else onChange([...selected, val]);
  };

  let display = allLabel;
  if (selected.length === 1) {
    const opt = options.find(o => o.value === selected[0]);
    display = opt ? opt.label : selected[0];
  } else if (selected.length > 1) {
    display = `${selected.length} selected`;
  }

  return (
    <div className={`multi-select ${open ? "ms-open" : ""}`}>
      <button className="ms-trigger" onClick={() => setOpen(o => !o)} type="button">
        <span className="ms-label">{label}</span>
        <span className="ms-value">{display}</span>
        <span className="ms-chev">▾</span>
      </button>
      {open && (
        <div className="ms-popover">
          {options.map(opt => {
            const checked = selected.includes(opt.value);
            return (
              <label key={opt.value} className={`ms-opt ${checked ? "ms-opt-checked" : ""}`}>
                <input
                  type="checkbox"
                  checked={checked}
                  onChange={() => toggle(opt.value)}
                />
                <span>{opt.label}</span>
              </label>
            );
          })}
          {selected.length > 0 && (
            <button className="ms-clear" onClick={() => onChange([])} type="button">Clear all</button>
          )}
        </div>
      )}
    </div>
  );
}

function YearRangePicker({ value, onChange, compact }) {
  const fi = ALL_YEARS.indexOf(value.from);
  return (
    <div className={`year-range-picker ${compact ? "yrp-compact" : ""}`}>
      <span className="yrp-label">Years</span>
      <select
        value={value.from}
        onChange={e => {
          const newFrom = e.target.value;
          const ni = ALL_YEARS.indexOf(newFrom);
          const ti = ALL_YEARS.indexOf(value.to);
          onChange({ from: newFrom, to: ni > ti ? newFrom : value.to });
        }}
      >
        {ALL_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
      </select>
      <span className="yrp-dash">–</span>
      <select
        value={value.to}
        onChange={e => {
          const newTo = e.target.value;
          const ni = ALL_YEARS.indexOf(newTo);
          onChange({ from: ni < fi ? newTo : value.from, to: newTo });
        }}
      >
        {ALL_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
      </select>
    </div>
  );
}

function QuarterCell({ yearData, year, onEdit, status }) {
  if (!yearData || !yearData.current) {
    return <div className="q-cell q-empty" onClick={() => onEdit(year, null)}>—</div>;
  }
  const { original, current, missed, originalMonth, currentMonth } = yearData;
  const slipped = original !== current || (originalMonth && currentMonth && originalMonth !== currentMonth);
  const fmtOrig = originalMonth ? `${original}·${originalMonth}` : original;
  const fmtCurr = currentMonth ? `${current}·${currentMonth}` : current;
  const toneClass = status === "done" ? "q-done" : (missed > 0 ? "q-slipped" : "q-normal");
  return (
    <div
      className={`q-cell ${toneClass}`}
      onClick={() => onEdit(year, yearData)}
      title={slipped ? `Originally ${fmtOrig} ${year} → now ${fmtCurr} ${year}` : `${fmtCurr} ${year}`}
    >
      {slipped ? (
        <>
          <span className="q-strike">{fmtOrig}</span>
          <span className="q-arrow">→</span>
          <span className="q-new">{fmtCurr}</span>
        </>
      ) : (
        <span>{fmtCurr}</span>
      )}
      {missed > 0 && <span className="q-missed">{"✕".repeat(Math.min(missed, 3))}</span>}
    </div>
  );
}

function Heatmap({ items, years }) {
  const owners = [...new Set(items.map(i => i.owner))].sort();
  const cols = [];
  years.forEach(y => QUARTERS.forEach(q => cols.push({ year: y, q })));
  const matrix = {};
  owners.forEach(o => {
    matrix[o] = {};
    cols.forEach(c => { matrix[o][`${c.year}-${c.q}`] = { total: 0, done: 0, slipped: 0, inflight: 0, atRisk: 0, missed: 0 }; });
  });
  items.forEach(item => {
    Object.entries(item.years).forEach(([y, yd]) => {
      const key = `${y}-${yd.current}`;
      const cell = matrix[item.owner] && matrix[item.owner][key];
      if (!cell) return;
      cell.total += 1;
      cell.missed += yd.missed || 0;
      if (item.status === "at_risk") cell.atRisk += 1;
      else if (item.status === "done") cell.done += 1;
      else cell.inflight += 1;
      if ((yd.missed || 0) > 0) cell.slipped += 1; 
    });
  });
  const maxCount = Math.max(1, ...owners.flatMap(o => cols.map(c => matrix[o][`${c.year}-${c.q}`].total)));

  return (
    <div className="heatmap-wrap">
      <div className="heatmap" style={{ gridTemplateColumns: `80px repeat(${cols.length}, 1fr)` }}>
        <div className="hm-corner" />
        {cols.map((c, i) => (
          <div key={i} className={`hm-header ${c.q === "Q1" ? "hm-year-start" : ""}`}>
            {c.q === "Q1" && <div className="hm-year-label">{c.year}</div>}
            <div className="hm-q-label">{c.q}</div>
          </div>
        ))}
        {owners.map(o => (
          <div key={o} className="hm-row" style={{ display: "contents" }}>
            <div className="hm-owner">{o}</div>
            {cols.map((c, i) => {
              const cell = matrix[o][`${c.year}-${c.q}`];
              const intensity = cell.total / maxCount;
              let tone = "empty";
              if (cell.total > 0) {
                if (cell.atRisk > 0) tone = "slip";
                else if (cell.done === cell.total) tone = "done";
                else tone = "inflight";
              }
              const titleParts = [`${o} · ${c.q} ${c.year}: ${cell.total} output${cell.total !== 1 ? "s" : ""}`];
              if (cell.done) titleParts.push(`${cell.done} done`);
              if (cell.inflight) titleParts.push(`${cell.inflight} in-flight`);
              if (cell.atRisk) titleParts.push(`${cell.atRisk} at risk`);
              if (cell.slipped) titleParts.push(`${cell.slipped} with slip history (${cell.missed} slip event${cell.missed !== 1 ? "s" : ""})`);
              return (
                <div
                  key={i}
                  className={`hm-cell hm-tone-${tone} ${c.q === "Q1" ? "hm-year-start" : ""}`}
                  style={{ "--intensity": intensity }}
                  title={titleParts.join(" · ")}
                >
                  {cell.total > 0 && <span className="hm-count">{cell.total}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function EditModal({ item, onClose, onSave, onDelete, existingProjects = [] }) {
  const [draft, setDraft] = useState(item);
  const [errors, setErrors] = useState({});
  useEffect(() => { setDraft(item); setErrors({}); }, [item]);
  if (!item) return null;
  const isNew = !!draft._isNew;

  const updateYear = (year, field, val) => {
    setDraft(d => {
      const yrs = { ...d.years };
      if (!yrs[year]) yrs[year] = { original: val, current: val, missed: 0 };
      const updated = { ...yrs[year], [field]: val };
      if (field === "original" && updated.originalMonth && !QUARTER_MONTHS[val].includes(updated.originalMonth)) {
        updated.originalMonth = "";
      }
      if (field === "current" && updated.currentMonth && !QUARTER_MONTHS[val].includes(updated.currentMonth)) {
        updated.currentMonth = "";
      }
      yrs[year] = updated;
      return { ...d, years: yrs };
    });
  };
  const setMonth = (year, field, val) => {
    setDraft(d => {
      const yrs = { ...d.years };
      if (!yrs[year]) return d;
      yrs[year] = { ...yrs[year], [field]: val };
      return { ...d, years: yrs };
    });
  };
  const setMissed = (year, val) => {
    setDraft(d => {
      const yrs = { ...d.years };
      if (!yrs[year]) return d;
      yrs[year] = { ...yrs[year], missed: parseInt(val) || 0 };
      return { ...d, years: yrs };
    });
  };
  const clearYear = (year) => {
    setDraft(d => {
      const yrs = { ...d.years };
      delete yrs[year];
      return { ...d, years: yrs };
    });
  };
  const addYear = (year) => {
    setDraft(d => {
      if (d.years[year]) return d;
      return { ...d, years: { ...d.years, [year]: { original: "Q1", current: "Q1", missed: 0 } } };
    });
  };
  const recomputeSlippages = (d) => ({ ...d, slippages: Object.values(d.years).reduce((a, y) => a + (y.missed || 0), 0) });

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-eyebrow">{isNew ? "New output" : "Editing output"}</div>
            <div className="modal-project">{draft.project || "Untitled project"}</div>
            {!isNew && <div className="modal-owner">Owner · {draft.owner || "—"}</div>}
          </div>
          <button className="icon-btn" onClick={onClose}><X size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="field-row">
            <label className="field" style={{ flex: 1 }}>
              <span className="field-lbl">Project {errors.project && <span className="field-err">required</span>}</span>
              <input
                value={draft.project || ""}
                onChange={e => setDraft(d => ({ ...d, project: e.target.value }))}
                placeholder="e.g. HERA"
                list="project-suggestions"
                className={errors.project ? "input-err" : ""}
              />
              <datalist id="project-suggestions">
                {existingProjects.map(p => <option key={p} value={p} />)}
              </datalist>
            </label>
          </div>

          <label className="field">
            <span className="field-lbl">Output {errors.output && <span className="field-err">required</span>}</span>
            <textarea
              value={draft.output}
              onChange={e => setDraft(d => ({ ...d, output: e.target.value }))}
              rows={2}
              placeholder="Describe the deliverable"
              className={errors.output ? "input-err" : ""}
            />
          </label>

          <div className="field-row">
            <label className="field">
              <span className="field-lbl">Status</span>
              <div className="status-picker">
                {STATUSES.map(s => {
                  const Icon = s.icon;
                  const active = draft.status === s.code;
                  return (
                    <button
                      key={s.code}
                      className={`sp-btn ${active ? "sp-active" : ""}`}
                      style={{ "--pill-color": s.color }}
                      onClick={() => setDraft(d => {
                        const next = { ...d, status: s.code };
                        if (s.code !== "done" && d.validated) {
                          next.validated = false;
                          next.validatedAt = null;
                        }
                        return next;
                      })}
                    >
                      <Icon size={13} /> {s.label}
                    </button>
                  );
                })}
              </div>
            </label>
            <label className="field" style={{ flex: "0 0 200px" }}>
              <span className="field-lbl">Leader / Owner</span>
              <select
                value={draft.owner || ""}
                onChange={e => {
                  const v = e.target.value;
                  setDraft(d => ({ ...d, owner: v, lt: v }));
                }}
              >
                <option value="">— select —</option>
                {TEAM_ROSTER.map(p => (
                  <option key={p.initials} value={p.initials}>{p.initials} · {p.name}</option>
                ))}
              </select>
            </label>
          </div>

          <div className="field">
            <label className={`validation-row ${draft.status !== "done" ? "validation-disabled" : ""}`}>
              <input
                type="checkbox"
                checked={!!draft.validated}
                disabled={draft.status !== "done"}
                onChange={e => {
                  const checked = e.target.checked;
                  setDraft(d => ({
                    ...d,
                    validated: checked,
                    validatedAt: checked ? new Date().toISOString() : null,
                  }));
                }}
              />
              <span className="validation-label">
                Output validated
                {draft.status !== "done" && <span className="validation-hint"> · available once status is Done</span>}
                {draft.validated && draft.validatedAt && (
                  <span className="validation-stamp"> · {new Date(draft.validatedAt).toLocaleDateString()}</span>
                )}
              </span>
            </label>
          </div>

          <label className="field">
            <span className="field-lbl">Notes</span>
            <textarea
              value={draft.notes || ""}
              onChange={e => setDraft(d => ({ ...d, notes: e.target.value }))}
              rows={2}
            />
          </label>

          <div className="field">
            <span className="field-lbl">Participants</span>
            <MultiSelect
              label="Participants"
              allLabel="None"
              options={TEAM_ROSTER
                .filter(p => p.initials !== draft.owner)
                .map(p => ({ value: p.initials, label: `${p.initials} · ${p.name}` }))}
              selected={Array.isArray(draft.participants) ? draft.participants : []}
              onChange={vals => setDraft(d => ({ ...d, participants: vals }))}
            />
          </div>

          <div className="field">
            <span className="field-lbl">Planned Quarters</span>
            <div className="years-editor">
              {ALL_YEARS.map(y => {
                const yd = draft.years[y];
                return (
                  <div key={y} className={`year-box ${yd ? "year-active" : ""}`}>
                    <div className="year-head">
                      <span className="year-label">{y}</span>
                      {yd ? (
                        <button className="mini-btn" onClick={() => clearYear(y)}><X size={11} /></button>
                      ) : (
                        <button className="mini-btn mini-add" onClick={() => addYear(y)}>+</button>
                      )}
                    </div>
                    {yd && (
                      <div className="year-fields">
                        <div className="yf-row yf-row-quarter">
                          <span className="yf-lbl">Plan</span>
                          <select value={yd.original} onChange={e => updateYear(y, "original", e.target.value)}>
                            {QUARTERS.map(q => <option key={q} value={q}>{q}</option>)}
                          </select>
                          <select
                            className="yf-month"
                            value={yd.originalMonth || ""}
                            onChange={e => setMonth(y, "originalMonth", e.target.value)}
                            title="Optional month"
                          >
                            <option value="">—</option>
                            {QUARTER_MONTHS[yd.original].map(m => <option key={m} value={m}>{m}</option>)}
                          </select>
                        </div>
                        <div className="yf-row yf-row-quarter">
                          <span className="yf-lbl">Now</span>
                          <select value={yd.current} onChange={e => updateYear(y, "current", e.target.value)}>
                            {QUARTERS.map(q => <option key={q} value={q}>{q}</option>)}
                          </select>
                          <select
                            className="yf-month"
                            value={yd.currentMonth || ""}
                            onChange={e => setMonth(y, "currentMonth", e.target.value)}
                            title="Optional month"
                          >
                            <option value="">—</option>
                            {QUARTER_MONTHS[yd.current].map(m => <option key={m} value={m}>{m}</option>)}
                          </select>
                        </div>
                        <div className="yf-row">
                          <span className="yf-lbl">Slips</span>
                          <input type="number" min="0" max="5" value={yd.missed} onChange={e => setMissed(y, e.target.value)} />
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div className="modal-foot">
          {!isNew && onDelete && (
            <button className="btn-danger" onClick={() => onDelete(draft.id)}>Delete</button>
          )}
          <div style={{ flex: 1 }} />
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={() => {
            const errs = {};
            if (!draft.project || !draft.project.trim()) errs.project = true;
            if (!draft.output || !draft.output.trim()) errs.output = true;
            if (Object.keys(errs).length) { setErrors(errs); return; }
            const cleaned = { ...draft };
            delete cleaned._isNew;
            onSave(recomputeSlippages(cleaned));
          }}>{isNew ? "Add output" : "Save changes"}</button>
        </div>
      </div>
    </div>
  );
}

function TeamOutputsApp() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [filters, setFilters] = useState({ owner: "all", project: "all", statuses: [], riskOnly: false });
  const [sortBy, setSortBy] = useState("slippages");
  const [editItem, setEditItem] = useState(null);
  const [view, setView] = useState("dashboard");
  const [yearRange, setYearRange] = useState(() => {
    try {
      const saved = localStorage.getItem("team_outputs_year_range");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && ALL_YEARS.includes(parsed.from) && ALL_YEARS.includes(parsed.to)) return parsed;
      }
    } catch {}
    return { from: DEFAULT_YEAR_FROM, to: DEFAULT_YEAR_TO };
  });
  const displayedYears = useMemo(() => yearsInRange(yearRange.from, yearRange.to), [yearRange]);
  useEffect(() => {
    try { localStorage.setItem("team_outputs_year_range", JSON.stringify(yearRange)); } catch {}
  }, [yearRange]);
  const [theme, setTheme] = useState(() => {
    try {
      const saved = localStorage.getItem("team_outputs_theme");
      return saved === "light" || saved === "dark" ? saved : "dark";
    } catch { return "dark"; }
  });

  useEffect(() => {
    try { localStorage.setItem("team_outputs_theme", theme); } catch {}
  }, [theme]);

  // Load from Supabase on mount
  useEffect(() => {
    loadFromSupabase(setData, setLoading);
  }, []);

  const owners = useMemo(() => [...new Set(data.map(d => d.owner))].sort(), [data]);
  const projects = useMemo(() => [...new Set(data.map(d => d.project))].sort(), [data]);

  const filtered = useMemo(() => {
    return data.filter(d => {
      if (filters.owner !== "all" && d.owner !== filters.owner) return false;
      if (filters.project !== "all" && d.project !== filters.project) return false;
      if (filters.statuses.length > 0 && !filters.statuses.includes(d.status)) return false;
      if (filters.riskOnly && d.status !== "at_risk" && d.slippages === 0) return false;
      if (search && !(`${d.output} ${d.project} ${d.owner} ${d.notes}`.toLowerCase().includes(search.toLowerCase()))) return false;
      return true;
    });
  }, [data, filters, search]);

  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sortBy === "slippages") arr.sort((a, b) => b.slippages - a.slippages || a.project.localeCompare(b.project));
    else if (sortBy === "project") arr.sort((a, b) => a.project.localeCompare(b.project) || b.slippages - a.slippages);
    else if (sortBy === "owner") arr.sort((a, b) => a.owner.localeCompare(b.owner) || b.slippages - a.slippages);
    else if (sortBy === "status") arr.sort((a, b) => a.status.localeCompare(b.status));
    return arr;
  }, [filtered, sortBy]);

  const dashboardItems = useMemo(() => {
    const inRange = new Set(displayedYears);
    return data.filter(d => {
      const yrs = Object.keys(d.years || {});
      if (yrs.length === 0) return true;
      return yrs.some(y => inRange.has(y));
    });
  }, [data, displayedYears]);

  const stats = useMemo(() => {
    const s = { total: dashboardItems.length, done: 0, progress: 0, waiting: 0, risk: 0, slipped: 0, totalSlips: 0 };
    dashboardItems.forEach(d => {
      if (d.status === "done") s.done++;
      if (d.status === "in_progress") s.progress++;
      if (d.status === "waiting") s.waiting++;
      if (d.status === "at_risk") s.risk++;
      if (d.slippages > 0) s.slipped++;
      s.totalSlips += d.slippages;
    });
    return s;
  }, [dashboardItems]);

  const progressLeaderboard = useMemo(() => {
    const byOwner = {};
    dashboardItems.forEach(d => {
      if (!byOwner[d.owner]) byOwner[d.owner] = { owner: d.owner, total: 0, done: 0, inflight: 0, waiting: 0, risk: 0 };
      byOwner[d.owner].total++;
      if (d.status === "done") byOwner[d.owner].done++;
      else if (d.status === "in_progress") byOwner[d.owner].inflight++;
      else if (d.status === "at_risk") { byOwner[d.owner].inflight++; byOwner[d.owner].risk++; }
      else byOwner[d.owner].waiting++;
    });
    return Object.values(byOwner).sort((a, b) => {
      const aRate = a.total > 0 ? a.done / a.total : 0;
      const bRate = b.total > 0 ? b.done / b.total : 0;
      if (bRate !== aRate) return bRate - aRate;
      return b.done - a.done;
    });
  }, [dashboardItems]);

  const projectHealth = useMemo(() => {
    const byProj = {};
    dashboardItems.forEach(d => {
      if (!byProj[d.project]) byProj[d.project] = { project: d.project, total: 0, done: 0, slips: 0, risk: 0 };
      byProj[d.project].total++;
      if (d.status === "done") byProj[d.project].done++;
      byProj[d.project].slips += d.slippages;
      if (d.status === "at_risk") byProj[d.project].risk++;
    });
    return Object.values(byProj).sort((a, b) => b.slips - a.slips || b.risk - a.risk);
  }, [dashboardItems]);

  // --- SUPABASE UPSERT ---
  const handleSave = async (updated) => {
    // Optimistic UI Update
    setData(d => {
      const exists = d.some(x => x.id === updated.id);
      return exists ? d.map(x => x.id === updated.id ? updated : x) : [...d, updated];
    });
    setEditItem(null);

    // Sync to DB
    const { error } = await supabaseClient.from('outputs').upsert(updated);
    if (error) {
      console.error("Error saving to Supabase:", error);
      alert("Failed to save changes to the database.");
    }
  };

  const handleAddNew = () => {
    const newItem = {
      id: "out_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      project: "",
      owner: "",
      output: "",
      notes: "",
      years: {},
      status: "waiting",
      lt: "",
      slippages: 0,
      _isNew: true,
    };
    setEditItem(newItem);
  };

  // --- SUPABASE DELETE ---
  const handleDelete = async (id) => {
    if (!confirm("Delete this output? This cannot be undone.")) return;
    
    // Optimistic UI Update
    setData(d => d.filter(x => x.id !== id));
    setEditItem(null);

    // Sync to DB
    const { error } = await supabaseClient.from('outputs').delete().eq('id', id);
    if (error) {
      console.error("Error deleting from Supabase:", error);
      alert("Failed to delete the item from the database.");
    }
  };

  // --- SUPABASE CLEAR DB ---
  const handleReset = async () => {
    if (confirm("Clear ALL outputs? This empties the tracker completely in the database.")) {
      setData([]);
      
      const { error } = await supabaseClient.from('outputs').delete().neq('id', 'prevent_empty_delete_error');
      if (error) {
        console.error("Error clearing database:", error);
        alert("Failed to clear database.");
      }
    }
  };

  const [lastSaved, setLastSaved] = useState(() => {
    try { return localStorage.getItem("team_outputs_last_saved") || null; } catch { return null; }
  });
  const [lastLoaded, setLastLoaded] = useState(() => {
    try { return localStorage.getItem("team_outputs_last_loaded") || null; } catch { return null; }
  });

  const handleExport = () => {
    const now = new Date();
    const payload = {
      _meta: {
        savedAt: now.toISOString(),
        version: 1,
        count: data.length,
      },
      outputs: data,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = now.toISOString().slice(0, 16).replace("T", "_").replace(":", "h");
    a.href = url;
    a.download = `team-outputs_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    const iso = now.toISOString();
    setLastSaved(iso);
    try { localStorage.setItem("team_outputs_last_saved", iso); } catch {}
  };

  const handleImport = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; 
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const parsed = JSON.parse(reader.result);
        const incoming = Array.isArray(parsed) ? parsed : (parsed.outputs || []);
        if (!Array.isArray(incoming) || incoming.length === 0) {
          alert("That file doesn't look like a valid team-outputs JSON.");
          return;
        }
        const bad = incoming.find(x => !x.id || !x.project || !x.output);
        if (bad) {
          alert("The file is missing required fields on at least one item. Import cancelled.");
          return;
        }
        const savedAt = parsed._meta && parsed._meta.savedAt;
        const label = savedAt ? new Date(savedAt).toLocaleString() : "unknown date";
        if (!confirm(`Load ${incoming.length} outputs from file (saved ${label})?\n\nThis will replace and sync data to your Supabase database.`)) {
          return;
        }
        
        const migrated = migrateData(incoming);
        setData(migrated);
        
        // Upsert imported data to Supabase
        const { error } = await supabaseClient.from('outputs').upsert(migrated);
        if (error) {
          console.error("Error bulk upserting to Supabase:", error);
          alert("Failed to sync imported data to Supabase.");
        }

        const iso = new Date().toISOString();
        setLastLoaded(iso);
        try { localStorage.setItem("team_outputs_last_loaded", iso); } catch {}
      } catch (err) {
        alert("Could not parse that file as JSON:\n\n" + (err.message || err));
      }
    };
    reader.readAsText(file);
  };

  if (loading) return <div className="app-loading">Loading…</div>;

  return (
    <div className="app" data-theme={theme}>
      <style>{CSS}</style>

      <header className="hdr">
        <div className="hdr-title">
          <div className="hdr-eyebrow">INEGI</div>
          <h1>Project Outputs</h1>
          <div className="hdr-sub">Composites Unit · output tracker</div>
        </div>
        <div className="hdr-actions">
          {(lastSaved || lastLoaded) && (
            <div className="file-stamp" title={lastSaved ? `Last saved to file: ${new Date(lastSaved).toLocaleString()}` : `Last loaded from file: ${new Date(lastLoaded).toLocaleString()}`}>
              {lastSaved && (!lastLoaded || new Date(lastSaved) > new Date(lastLoaded))
                ? <>saved · <b>{relativeTime(lastSaved)}</b></>
                : <>loaded · <b>{relativeTime(lastLoaded)}</b></>}
            </div>
          )}
          <button className="btn-new" onClick={handleAddNew} title="Add a new output">
            <Plus size={14} /> New output
          </button>
          <button className="icon-btn" onClick={() => setTheme(t => t === "dark" ? "light" : "dark")} title={theme === "dark" ? "Switch to light theme" : "Switch to dark theme"}>
            {theme === "dark" ? <Sun size={16} /> : <Moon size={16} />}
          </button>
          <label className="icon-btn" title="Load data from file">
            <Upload size={16} />
            <input type="file" accept="application/json,.json" onChange={handleImport} style={{ display: "none" }} />
          </label>
          <button className="icon-btn" onClick={handleExport} title="Save data to file"><Download size={16} /></button>
          <button className="icon-btn icon-btn-danger" onClick={handleReset} title="Clear all outputs"><Trash2 size={16} /></button>
        </div>
      </header>

      <nav className="tabs">
        {[
          { id: "dashboard", label: "Dashboard" },
          { id: "heatmap", label: "Heatmap" },
          { id: "risk", label: "Risk & Slippage" },
          { id: "table", label: "All Outputs" },
        ].map(t => (
          <button
            key={t.id}
            className={`tab ${view === t.id ? "tab-active" : ""}`}
            onClick={() => setView(t.id)}
          >{t.label}</button>
        ))}
      </nav>

      {view === "dashboard" && (
        <div className="v-dash">
          <div className="dash-toolbar">
            <div className="dash-toolbar-info">
              {dashboardItems.length < data.length && (
                <span>Showing <b>{dashboardItems.length}</b> of {data.length} outputs with plans in this range</span>
              )}
            </div>
            <YearRangePicker value={yearRange} onChange={setYearRange} />
          </div>
          <div className="stats-row">
            <div className="stat">
              <div className="stat-label">Total outputs</div>
              <div className="stat-value">{stats.total}</div>
              <div className="stat-meta">{projects.length} projects · {owners.length} people</div>
            </div>
            <div className="stat stat-done">
              <div className="stat-label">Done</div>
              <div className="stat-value">{stats.done}</div>
              <div className="stat-meta">{stats.total > 0 ? Math.round(100 * stats.done / stats.total) : 0}% complete</div>
            </div>
            <div className="stat stat-progress">
              <div className="stat-label">In progress</div>
              <div className="stat-value">{stats.progress}</div>
              <div className="stat-meta">{stats.waiting} waiting</div>
            </div>
            <div className="stat stat-risk">
              <div className="stat-label">Slipped</div>
              <div className="stat-value">{stats.slipped}</div>
              <div className="stat-meta">{stats.totalSlips} slip events · {stats.risk} at risk</div>
            </div>
          </div>

          <div className="dash-grid">
            <section className="panel">
              <header className="panel-hdr">
                <TrendingUp size={16} /><span>Outputs · planned vs completed</span>
              </header>
              <div className="leaderboard">
                {progressLeaderboard.map(row => {
                  const donePct = row.total > 0 ? (row.done / row.total) * 100 : 0;
                  const inflightPct = row.total > 0 ? (row.inflight / row.total) * 100 : 0;
                  const waitingPct = row.total > 0 ? (row.waiting / row.total) * 100 : 0;
                  const ratePct = Math.round(donePct);
                  return (
                    <div key={row.owner} className="lb-row" onClick={() => { setView("table"); setFilters(f => ({ ...f, owner: row.owner })); }}>
                      <div className="lb-owner">{row.owner}</div>
                      <div className="lb-progress">
                        <div className="lb-segbar" title={`${row.done} done · ${row.inflight} in-flight · ${row.waiting} waiting`}>
                          {donePct > 0 && <div className="lb-seg lb-seg-done" style={{ width: `${donePct}%` }} />}
                          {inflightPct > 0 && <div className="lb-seg lb-seg-inflight" style={{ width: `${inflightPct}%` }} />}
                          {waitingPct > 0 && <div className="lb-seg lb-seg-waiting" style={{ width: `${waitingPct}%` }} />}
                        </div>
                        <div className="lb-detail">
                          <span className="lb-pct">{ratePct}%</span>
                          <span className="lb-counts">{row.done} of {row.total}</span>
                          {row.risk > 0 && <span className="lb-risk">⚠ {row.risk}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            <section className="panel">
              <header className="panel-hdr">
                <FolderKanban size={16} /><span>Project health</span>
              </header>
              <div className="proj-list">
                {projectHealth.slice(0, 10).map(p => {
                  const doneRate = p.total > 0 ? p.done / p.total : 0;
                  return (
                    <div key={p.project} className="proj-row" onClick={() => { setView("table"); setFilters(f => ({ ...f, project: p.project })); }}>
                      <div className="proj-name">{p.project}</div>
                      <div className="proj-meta">
                        <span className="proj-count">{p.done}/{p.total}</span>
                        <div className="proj-track"><div className="proj-fill" style={{ width: `${doneRate * 100}%` }} /></div>
                        {p.slips > 0 && <span className="proj-slips">◷{p.slips}</span>}
                        {p.risk > 0 && <span className="proj-risk">⚠{p.risk}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            <section className="panel panel-full">
              <header className="panel-hdr">
                <AlertTriangle size={16} /><span>Needs attention</span>
              </header>
              <div className="attn-list">
                {dashboardItems
                  .filter(d => d.status === "at_risk" || d.slippages >= 2)
                  .sort((a, b) => b.slippages - a.slippages)
                  .slice(0, 8)
                  .map(d => (
                    <div key={d.id} className="attn-row" onClick={() => setEditItem(d)}>
                      <StatusPill code={d.status} compact />
                      <div className="attn-info">
                        <div className="attn-output">{d.output}</div>
                        <div className="attn-meta">{d.project} · {d.owner}{d.slippages > 0 ? ` · ${d.slippages} slip${d.slippages !== 1 ? "s" : ""}` : ""}</div>
                      </div>
                      <ChevronRight size={14} className="attn-arrow" />
                    </div>
                  ))}
                {dashboardItems.filter(d => d.status === "at_risk" || d.slippages >= 2).length === 0 && (
                  <div className="empty-note">No items need attention.</div>
                )}
              </div>
            </section>
          </div>
        </div>
      )}

      {view === "heatmap" && (
        <div className="v-heat">
          <div className="heatmap-toolbar">
            <div className="panel-hdr" style={{ padding: 0, border: "none", margin: 0 }}>
              <Users size={16} /><span>Outputs by owner & quarter · green = all done, amber = in-flight, red = at risk</span>
            </div>
            <YearRangePicker value={yearRange} onChange={setYearRange} />
          </div>
          <Heatmap items={data} years={displayedYears} />
          <div className="hm-legend">
            <div className="hm-leg-row">
              <span className="hm-leg-box" style={{ background: "color-mix(in srgb, var(--done) 70%, var(--cell-bg))" }} />
              <span>all done</span>
              <span style={{ marginLeft: 16 }} />
              <span className="hm-leg-box" style={{ background: "color-mix(in srgb, var(--accent) 65%, var(--cell-bg))" }} />
              <span>in-flight</span>
              <span style={{ marginLeft: 16 }} />
              <span className="hm-leg-box" style={{ background: "color-mix(in srgb, var(--risk) 70%, var(--cell-bg))" }} />
              <span>at risk</span>
            </div>
          </div>
        </div>
      )}

      {view === "risk" && (
        <div className="v-risk">
          <div className="risk-summary">
            <div className="risk-big">
              <div className="risk-big-num">{stats.totalSlips}</div>
              <div className="risk-big-lbl">total slip events across {stats.slipped} outputs</div>
            </div>
            <div className="risk-big">
              <div className="risk-big-num" style={{ color: "var(--risk)" }}>{stats.risk}</div>
              <div className="risk-big-lbl">outputs flagged at risk</div>
            </div>
          </div>
          <div className="risk-list">
            {data
              .filter(d => d.slippages > 0 || d.status === "at_risk")
              .sort((a, b) => b.slippages - a.slippages)
              .map(d => (
                <div key={d.id} className="risk-card" onClick={() => setEditItem(d)}>
                  <div className="risk-card-head">
                    <StatusPill code={d.status} compact />
                    <span className="risk-owner">{d.owner}</span>
                    <span className="risk-proj">{d.project}</span>
                    <span className="risk-slips">
                      {Array.from({ length: d.slippages }).map((_, i) => (
                        <span key={i} className="risk-slip-dot" />
                      ))}
                      {d.slippages} slip{d.slippages !== 1 ? "s" : ""}
                    </span>
                  </div>
                  <div className="risk-output">{d.output}</div>
                  <div className="risk-timeline">
                    {Object.entries(d.years).map(([y, yd]) => {
                      const slipped = yd.original !== yd.current || (yd.originalMonth && yd.currentMonth && yd.originalMonth !== yd.currentMonth);
                      const fmtO = yd.originalMonth ? `${yd.original}·${yd.originalMonth}` : yd.original;
                      const fmtC = yd.currentMonth ? `${yd.current}·${yd.currentMonth}` : yd.current;
                      const toneCls = d.status === "done" ? "risk-pin-done" : (slipped ? "risk-pin-slip" : "");
                      return (
                        <div key={y} className={`risk-pin ${toneCls}`}>
                          <span className="rp-year">{y}</span>
                          {slipped ? <span><s>{fmtO}</s> → <b>{fmtC}</b></span> : <span>{fmtC}</span>}
                        </div>
                      );
                    })}
                  </div>
                  {d.notes && <div className="risk-notes">{d.notes}</div>}
                </div>
              ))}
            {data.filter(d => d.slippages > 0 || d.status === "at_risk").length === 0 && (
              <div className="empty-note">No slippage or at-risk items. Nice work.</div>
            )}
          </div>
        </div>
      )}

      {view === "table" && (
        <div className="v-table">
          <div className="toolbar">
            <div className="search-wrap">
              <Search size={14} />
              <input
                placeholder="Search output, project, notes…"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
            <select value={filters.owner} onChange={e => setFilters(f => ({ ...f, owner: e.target.value }))}>
              <option value="all">All owners</option>
              {owners.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            <select value={filters.project} onChange={e => setFilters(f => ({ ...f, project: e.target.value }))}>
              <option value="all">All projects</option>
              {projects.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <MultiSelect
              label="Status"
              allLabel="Any"
              options={STATUSES.map(s => ({ value: s.code, label: s.label }))}
              selected={filters.statuses}
              onChange={vals => setFilters(f => ({ ...f, statuses: vals }))}
            />
            <label className="check-tog">
              <input type="checkbox" checked={filters.riskOnly} onChange={e => setFilters(f => ({ ...f, riskOnly: e.target.checked }))} />
              Risk/slipped only
            </label>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="slippages">Sort: slippages</option>
              <option value="project">Sort: project</option>
              <option value="owner">Sort: owner</option>
              <option value="status">Sort: status</option>
            </select>
            <YearRangePicker value={yearRange} onChange={setYearRange} compact />
            <div className="tb-count">{sorted.length} / {data.length}</div>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Status</th>
                  <th>Project</th>
                  <th>Owner</th>
                  <th>Output</th>
                  {displayedYears.map(y => <th key={y} className="th-q">{y}</th>)}
                  <th className="th-slip">Slips</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map(d => (
                  <tr key={d.id} onClick={() => setEditItem(d)}>
                    <td>
                      <div className="status-stack">
                        <StatusPill code={d.status} compact />
                        {d.validated && <span className="validated-tick" title={`Validated ${d.validatedAt ? new Date(d.validatedAt).toLocaleDateString() : ""}`}>✓</span>}
                      </div>
                    </td>
                    <td className="td-proj">{d.project}</td>
                    <td className="td-owner">
                      <span>{d.owner}</span>
                      {d.participants && d.participants.length > 0 && (
                        <span className="participant-count" title={d.participants.join(", ")}>+{d.participants.length}</span>
                      )}
                    </td>
                    <td className="td-out">
                      <div className="td-out-main">{d.output}</div>
                      {d.notes && <div className="td-out-notes">{d.notes}</div>}
                    </td>
                    {displayedYears.map(y => (
                      <td key={y} className="td-q">
                        <QuarterCell yearData={d.years[y]} year={y} onEdit={() => setEditItem(d)} status={d.status} />
                      </td>
                    ))}
                    <td className="td-slip">
                      {d.slippages > 0 ? (
                        <span className="slip-badge">
                          {Array.from({ length: Math.min(d.slippages, 3) }).map((_, i) => <span key={i} className="slip-dot" />)}
                          {d.slippages}
                        </span>
                      ) : <span className="slip-none">—</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {editItem && <EditModal item={editItem} onClose={() => setEditItem(null)} onSave={handleSave} onDelete={handleDelete} existingProjects={projects} />}
    </div>
  );
}

const CSS = `
  :root {
    /* INEGI brand palette — dark theme */

    --bg-2: #1d2024;
    --bg-3: #262a2f;
    --line: #353a40;
    --line-2: #474d54;
    --ink: #ebeef1;
    --ink-dim: #9aa2ab;
    --ink-dimmer: #6e767f;
    --accent: #b82d44;        /* INEGI red, slightly lifted for dark bg */
    --accent-2: #981E32;      /* Pantone 201C */
    --done: #719580;          /* secondary sage */
    --progress: #679AA5;      /* secondary teal */
    --waiting: #A49581;       /* secondary warm beige */
    --risk: #C26E3E;          /* secondary terracotta */
    --navy: #4d6f8c;          /* secondary deep navy, lifted for dark bg */
    --risk-glow: #d68654;

    --shadow: 0 2px 12px rgba(0,0,0,0.35);
    --radius: 4px;
  }

    /* INEGI brand palette — light theme */

    --line: #dde1e5;
    --line-2: #c4cad0;
    --ink: #1d2024;
    --ink-dim: #6b727a;
    --ink-dimmer: #9aa1a8;
    --accent: #981E32;        /* Pantone 201C */
    --accent-2: #8B2638;      /* darker brick from secondary */
    --done: #5a7d68;
    --progress: #4d818c;
    --waiting: #8a7d6a;
    --risk: #b25a2c;
    --navy: #29445C;          /* secondary deep navy, brand spec */
    --risk-glow: #c46f3e;
    --cell-bg: #eef0f2;
    --shadow: 0 2px 12px rgba(20,30,40,0.06);
  }
  .app[data-theme="light"] .btn-primary { color: #ffffff; }
  .app[data-theme="light"] .modal-backdrop { background: rgba(20, 30, 40, 0.4); }
  * { box-sizing: border-box; }
  .app {
    font-family: 'Barlow', 'Barlow', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 28px 32px 60px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .app-loading {
    font-family: 'Barlow', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink-dim);
    min-height: 100vh;
    display: grid;
    place-items: center;
  }
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 4px 0 22px 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 0;
    position: relative;
  }
  .hdr::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 28px;
    width: 4px;
    background: var(--accent);
  }
  .hdr-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.32em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .hdr h1 {
    font-family: 'Barlow Condensed', 'DIN Condensed', 'Helvetica Neue', sans-serif;
    font-weight: 600;

  .td-out-notes {
    color: var(--ink-dimmer);
    font-size: 11px;
    margin-top: 2px;
    font-style: italic;
  }
  .td-q { text-align: center; min-width: 70px; }
  .q-cell {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 7px;
    border-radius: 3px;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
  }
  .q-normal { background: var(--bg-3); color: var(--ink); }
  .q-slipped {
    background: color-mix(in srgb, var(--risk) 18%, var(--bg-3));
    color: var(--risk);
    border: 1px solid color-mix(in srgb, var(--risk) 40%, transparent);
  }
  .q-done {
    background: color-mix(in srgb, var(--done) 18%, var(--bg-3));
    color: var(--done);
    border: 1px solid color-mix(in srgb, var(--done) 40%, transparent);
  }
  .q-done .q-missed { color: var(--done); opacity: 0.6; }
  .q-empty { color: var(--ink-dimmer); }
  .q-strike { text-decoration: line-through; opacity: 0.6; }
  .q-arrow { opacity: 0.7; }
  .q-new { font-weight: 700; }
  .q-missed { color: var(--risk); margin-left: 2px; font-size: 9px; }
  .td-slip { text-align: center; }
  .slip-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--risk);
    font-weight: 600;
    font-size: 11px;
  }
  .slip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--risk);
  }
  .slip-none { color: var(--ink-dimmer); }

  .th-q, .th-slip { text-align: center; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 8, 5, 0.72);
    backdrop-filter: blur(4px);
    display: grid;
    place-items: center;
    z-index: 100;
    padding: 20px;
    animation: fade-in 0.15s ease-out;
  }
  @keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: 8px;
    max-width: 820px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--line);
  }
  .modal-project {
    font-family: 'Barlow Condensed', 'DIN Condensed', 'Helvetica Neue', sans-serif;
    font-size: 20px;
    color: var(--ink);
    font-weight: 600;
  }
  .modal-owner {
    font-size: 11px;
    color: var(--ink-dimmer);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .modal-body {
    padding: 20px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-foot {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 14px 24px;
    border-top: 1px solid var(--line);
  }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .field-row { display: flex; gap: 14px; }
  .field-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--ink-dimmer);
    text-transform: uppercase;
  }
  .field input, .field textarea, .field select {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 10px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }

  .status-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .sp-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11.5px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sp-btn:hover { color: var(--ink); border-color: var(--line-2); }
  .sp-active {
    background: color-mix(in srgb, var(--pill-color) 18%, transparent);
    color: var(--pill-color);
    border-color: color-mix(in srgb, var(--pill-color) 50%, transparent);
  }

  .years-editor { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .year-box {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px;
  }
  .year-active { border-color: var(--accent-2); }
  .year-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .year-label {
    font-family: 'Barlow Condensed', 'DIN Condensed', 'Helvetica Neue', sans-serif;
    font-size: 14px;
    color: var(--ink);
  }
  .mini-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    width: 20px;
    height: 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    display: grid;
    place-items: center;
    padding: 0;
  }
  .mini-btn:hover { color: var(--ink); border-color: var(--line-2); }
  .mini-add { color: var(--accent); }
  .year-fields { display: flex; flex-direction: column; gap: 4px; }
  .yf-row {
    display: grid;
    grid-template-columns: 40px 1fr;
    align-items: center;
    gap: 6px;
  }
  .yf-row-quarter {
    grid-template-columns: 40px 1fr 1fr;
  }
  .yf-month {
    font-size: 10px !important;
    color: var(--ink-dim) !important;
  }
  .yf-month:hover, .yf-month:focus { color: var(--accent) !important; }
  .yf-lbl {
    font-size: 9.5px;
    color: var(--ink-dimmer);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .yf-row select, .yf-row input {
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 3px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }

  .btn-primary, .btn-secondary {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .btn-primary:hover { background: color-mix(in srgb, var(--accent) 85%, white); }
  .btn-secondary {
    background: transparent;
    border-color: var(--line);
    color: var(--ink-dim);
  }
  .btn-secondary:hover { color: var(--ink); border-color: var(--line-2); }
  .btn-danger {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    background: transparent;
    border: 1px solid color-mix(in srgb, var(--risk) 50%, transparent);
    color: var(--risk);
    transition: all 0.15s;
  }
  .btn-danger:hover {
    background: color-mix(in srgb, var(--risk) 12%, transparent);
    border-color: var(--risk);
  }
  .btn-new {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 7px 12px;
    border-radius: var(--radius);
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-new:hover { background: color-mix(in srgb, var(--accent) 85%, white); }
  .field-err {
    color: var(--risk);
    font-size: 9.5px;
    font-weight: 700;
    margin-left: 6px;
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }
  .input-err {
    border-color: var(--risk) !important;
    background: color-mix(in srgb, var(--risk) 6%, transparent);
  }
  .modal-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Font imports */
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap');

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .dash-grid { grid-template-columns: 1fr; }
    .risk-summary { grid-template-columns: 1fr; }
    .years-editor { grid-template-columns: repeat(2, 1fr); }
    .field-row { flex-direction: column; }
  }
`;

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TeamOutputsApp));

</script>
</body>
</html>
